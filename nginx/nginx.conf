events {
  worker_connections 1024;
}

http {
  upstream api {
    server api:3000;
  }
  
  upstream litellm {
    server litellm:4000;
  }

  # Rate limiting
  limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
  limit_req_zone $binary_remote_addr zone=llm:10m rate=5r/s;

  server {
    listen 80;
    server_name _;

    # API routes
    location /api/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass http://api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Health check
    location /health {
      proxy_pass http://api;
    }

    # LiteLLM dashboard (admin only in prod)
    location /litellm/ {
      limit_req zone=llm burst=5;
      proxy_pass http://litellm/;
    }
  }
}
