version: "3.8"

services:
  api:
    build: ./api
    container_name: ainexus-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgresql://ainexus:${DB_PASSWORD}@postgres:5432/ainexus
      - LITELLM_URL=http://litellm:4000
      - LITELLM_VIRTUAL_KEY=${LITELLM_VIRTUAL_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGIN=*
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - ZYTE_API_KEY=${ZYTE_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - GROUNDING_MODELS=${GROUNDING_MODELS:-}
      - GEMINI_PRO_MODEL=${GEMINI_PRO_MODEL:-}
      - XGROK_API_KEY=${XGROK_API_KEY}
      - XGROK_LITE_MODEL=${XGROK_LITE_MODEL:-grok-4-1-fast-non-reasoning}
      - XGROK_DEEP_MODEL=${XGROK_DEEP_MODEL:-grok-4-0709}
    depends_on:
      postgres:
        condition: service_healthy
      litellm:
        condition: service_healthy
    networks:
      - ainexus-network

  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: ainexus-litellm
    restart: unless-stopped
    ports:
      - "4000:4000"
    volumes:
      - ./litellm/litellm_config.yaml:/app/config.yaml
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      - DATABASE_URL=postgresql://ainexus:${DB_PASSWORD}@postgres:5432/litellm
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ainexus-network

  postgres:
    image: postgres:16-alpine
    container_name: ainexus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ainexus
      POSTGRES_USER: ainexus
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/01-create-litellm-db.sh:/docker-entrypoint-initdb.d/01-create-litellm-db.sh
      - ./database/02-init.sql:/docker-entrypoint-initdb.d/02-init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ainexus"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ainexus-network

  redis:
    image: redis:7-alpine
    container_name: ainexus-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - ainexus-network

  nginx:
    image: nginx:alpine
    container_name: ainexus-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - litellm
    networks:
      - ainexus-network

volumes:
  postgres_data:
  redis_data:

networks:
  ainexus-network:
    driver: bridge
