# ═══════════════════════════════════════════════════════
# AI NEXUS — LiteLLM Proxy Configuration
# Deploy: Coolify on Hostinger KVM 2
# Docs: https://docs.litellm.ai/docs/proxy/configs
# ═══════════════════════════════════════════════════════

model_list:
  # ── PRIMARY: GPT-4o-mini (fast + cheap, default for most tasks) ──
  - model_name: "gpt-4o-mini"
    litellm_params:
      model: "openai/gpt-4o-mini"
      api_key: "os.environ/OPENAI_API_KEY"
      max_tokens: 4096
      temperature: 0.7

  # ── POWER: GPT-4o (complex reasoning) ──
  - model_name: "gpt-4o"
    litellm_params:
      model: "openai/gpt-4o"
      api_key: "os.environ/OPENAI_API_KEY"
      max_tokens: 4096

  # ── FALLBACK: Claude Sonnet (best for conversation + analysis) ──
  - model_name: "claude-sonnet"
    litellm_params:
      model: "anthropic/claude-sonnet-4-20250514"
      api_key: "os.environ/ANTHROPIC_API_KEY"
      max_tokens: 4096

  # ── FAST: Groq Llama (ultra-low latency inference) ──
  - model_name: "groq-llama"
    litellm_params:
      model: "groq/llama-3.1-70b-versatile"
      api_key: "os.environ/GROQ_API_KEY"
      max_tokens: 4096

  # ── BUDGET: DeepSeek (cheapest option) ──
  - model_name: "deepseek"
    litellm_params:
      model: "deepseek/deepseek-chat"
      api_key: "os.environ/DEEPSEEK_API_KEY"
      max_tokens: 4096

  # ── Google Gemini Flash (fast + multimodal) ──
  - model_name: "gemini-flash"
    litellm_params:
      model: "gemini/gemini-2.0-flash"
      api_key: "os.environ/GOOGLE_API_KEY"
      max_tokens: 4096

# ── ROUTER: Auto-failover + latency routing ─────────
router_settings:
  routing_strategy: "latency-based-routing"
  num_retries: 3
  timeout: 60
  allowed_fails: 2
  cooldown_time: 30
  fallbacks:
    - "gpt-4o-mini": ["groq-llama", "claude-sonnet", "deepseek"]
    - "gpt-4o": ["claude-sonnet", "gpt-4o-mini"]
    - "claude-sonnet": ["gpt-4o", "gpt-4o-mini"]
    - "groq-llama": ["gpt-4o-mini", "deepseek"]
    - "deepseek": ["gpt-4o-mini", "groq-llama"]

# ── CACHING + SETTINGS ──────────────────────────────
litellm_settings:
  cache: true
  cache_params:
    type: "redis"
    host: "redis"
    port: 6379
    ttl: 3600

  max_budget: 100.0
  budget_duration: "30d"
  max_parallel_requests: 50
  tpm_limit: 100000
  rpm_limit: 500

# ── AUTH + DB ────────────────────────────────────────
general_settings:
  master_key: "os.environ/LITELLM_MASTER_KEY"
  database_url: "os.environ/DATABASE_URL"
  store_model_in_db: true
