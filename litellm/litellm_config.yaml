# ═══════════════════════════════════════════════════════
# AI NEXUS — LiteLLM Proxy Configuration
# Deploy: Coolify on Hostinger KVM 2
# Docs: https://docs.litellm.ai/docs/proxy/configs
# ═══════════════════════════════════════════════════════

model_list:
  # ── PRIMARY: Gemini 3.1 Flash Lite (fast + multimodal, preferred) ──
  - model_name: "gemini/gemini-3.1-flash-lite-preview"
    litellm_params:
      model: "gemini/gemini-3.1-flash-lite-preview"
      api_key: "os.environ/GOOGLE_API_KEY"
      max_tokens: 4096
      temperature: 0.7

  # ── FALLBACK: Groq Llama 3.3 (ultra-low latency, last resort) ──
  - model_name: "groq/llama-3.3-70b-versatile"
    litellm_params:
      model: "groq/llama-3.3-70b-versatile"
      api_key: "os.environ/GROQ_API_KEY"
      max_tokens: 4096

# ── ROUTER: Auto-failover + latency routing ─────────
router_settings:
  routing_strategy: "latency-based-routing"
  num_retries: 3
  timeout: 60
  allowed_fails: 2
  cooldown_time: 30
  fallbacks:
    - "gemini/gemini-3.1-flash-lite-preview": ["groq/llama-3.3-70b-versatile"]
    - "groq/llama-3.3-70b-versatile": ["gemini/gemini-3.1-flash-lite-preview"]

# ── CACHING + SETTINGS ──────────────────────────────
litellm_settings:
  cache: true
  cache_params:
    type: "redis"
    host: "redis"
    port: 6379
    ttl: 3600

  max_budget: 100.0
  budget_duration: "30d"
  max_parallel_requests: 50
  tpm_limit: 100000
  rpm_limit: 500

# ── AUTH + DB ────────────────────────────────────────
general_settings:
  master_key: "os.environ/LITELLM_MASTER_KEY"
  database_url: "os.environ/DATABASE_URL"
  store_model_in_db: true
